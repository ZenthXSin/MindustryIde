name: Java CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
jobs:
  buildapk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up PATH
        run: |
          echo "${ANDROID_HOME}/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build mod apk
        env:
          KEYSTORE_BASE64: 
          KEYSTORE_PASSWORD: mindustryide123
          KEY_ALIAS: mindustryide
          KEY_PASSWORD: mindustryide123
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          export KEYSTORE_PATH="release.keystore"
          bash ./gradlew assembleRelease

      - name: List build outputs
        run: ls -la app/build/outputs/apk/

      - name: Upload built apk file (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}
          path: app/build/outputs/apk/release/*.apk

      - name: Generate safe tag and release info
        id: release_info
        shell: bash
        run: |
          # 获取 commit 信息
          MESSAGE="$(jq -r '.head_commit.message' "$GITHUB_EVENT_PATH" 2>/dev/null || echo 'Auto Build')"
          TITLE="$(printf "%s" "$MESSAGE" | head -n 1)"
          BODY="$(printf "%s" "$MESSAGE" | tail -n +2 | sed '/./,$!d')"

          # 生成安全的 tag 名称：
          # 1. 转小写，空格变 -
          # 2. 非字母数字变 -
          # 3. 合并连续的 -
          # 4. 去除开头和结尾的 - 和 .
          SAFE_TAG="$(printf "%s" "$TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^[-.]*//;s/[-.]*$//')"

          # 如果 commit 全是中文，SAFE_TAG 为空，用固定前缀
          if [ -z "$SAFE_TAG" ]; then
            SAFE_TAG="build"
          fi

          # 加上时间戳确保唯一性，且不以 - 结尾
          TIMESTAMP="$(date +%Y%m%d-%H%M%S)"
          TAG_NAME="${SAFE_TAG}-${TIMESTAMP}"

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

          # 生成 release body
          cat > release_body.md <<EOF
          $BODY
          EOF

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag_name }}
          name: ${{ steps.release_info.outputs.title }}
          body_path: release_body.md
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
